<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Interview | Job Application Tracker</title>
    <link rel="stylesheet" href="./style/style.css">

    <!-- geist font -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Geist:wght@100..900&display=swap" rel="stylesheet">
    <!-- daisyUI and tailwind-->
    <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <!-- font awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
        integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
        crossorigin="anonymous" referrerpolicy="no-referrer" />


</head>

<body class="geist">
        <section class="dashboard">
        <div class="dashboard-container">
            <h2>Job Application Tracker</h2>
            <div class="dashboard-card">
                <div class="card-items">
                    <h3>Total</h3>
                    <p>8</p>
                </div>
                <div class="card-items">
                    <h3>Interview</h3>
                    <p id="dashboard-interview-count">0</p>
                </div>
                <div class="card-items">
                    <h3>Rejected</h3>
                    <p id="dashboard-reject-count">0</p>
                </div>
            </div>
        </div>

    </section>

    <section class="available-jobs">
        <div class="available-jobs-container">
            <div class="available-jobs-title">
                <h2>Available Jobs</h2>
                <p id="jobs-number">8 jobs</p>
            </div>
            <div class="available-jobs-feature">
                <button class="feature-btn btn-	base-100 ">All</button>
                <button class="feature-btn btn-	base-100 ">Interview</button>
                <button class="feature-btn btn-	base-100 ">Rejected</button>
            </div>





             <div class="interview-card bg-base-100 w-96 shadow-sm">
                <div class="interview-card-body">
                 <img class="no-jobs-img" src="./B13-A4-PH-Job-Tracker/jobs.png" alt="">
                 <h3 class="no-jobs-available">No jobs available</h3>
                 <p class="opportunities">Check back soon for new job opportunities</p>
                </div>
            </div>


    </body>
